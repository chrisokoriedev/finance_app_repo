name: expense_app
description: A new Flutter project.

publish_to: "none"

version: 1.0.0+2

environment:
  sdk: ">=3.2.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons:
  cloud_firestore:
  table_calendar:
  responsive_sizer: ^3.2.0
  gap:
  animated_custom_dropdown:
  icons_launcher: ^2.1.7
  line_icons: ^2.0.3
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3
  firebase_core:
  firebase_auth:
  firebase_remote_config:
  firebase_analytics:
  local_auth:
  url_launcher:
  flutter_easyloading:
  cached_network_image: ^3.3.1
  syncfusion_flutter_charts: ^22.2.5
  go_router: ^10.0.0
  google_sign_in:
  intl:
  freezed_annotation: ^2.1.0
  dartz: ^0.10.1
  injectable:
  timeago: ^3.5.0
  hooks_riverpod:
  shared_preferences:
  vibration: ^1.8.4
  # Modern data handling
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  # Better error handling
  fpdart: ^1.1.0
  # Performance monitoring
  firebase_performance:
  # Enhanced security
  crypto: ^3.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^2.0.0
  build_runner: ^2.4.7
  freezed: ^2.4.6
  injectable_generator: ^2.4.1
  riverpod_generator: ^2.3.9
  hive_generator: ^2.0.1
  json_annotation: ^4.8.1
  json_serializable: ^6.7.1

flutter:
  uses-material-design: true

icons_launcher:
  image_path: "assets/images/app_icon.png"
  adaptive_background_color: "#A9A9A9"
  platforms:
    android:
      enable: true
    ios:
      enable: true

  assets:
    - assets/
    - assets/gifs/  
    - assets/images/

